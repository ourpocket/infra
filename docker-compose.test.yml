# Test infrastructure for E2E tests
# Usage: docker compose -f docker-compose.test.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ourpocket-test-db
    environment:
      POSTGRES_USER: ourpocket
      POSTGRES_PASSWORD: ourpocket
      POSTGRES_DB: ourpocket
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ourpocket"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ourpocket-test-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
